<!DOCTYPE html>
<html>
<head>
  <title>Floorsheet Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      background: #0f172a;
      color: #e5e7eb;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 16px;
      background: #020617;
    }

    th, td {
      border: 1px solid #1e293b;
      padding: 8px;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      background: #020617;
    }

    button {
      margin: 10px 5px 0 0;
      padding: 6px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h2>Floorsheet Table</h2>

  <div>
    <button onclick="prevPage()">Prev</button>
    <button onclick="nextPage()">Next</button>
    <span id="pageInfo"></span>
  </div>

  <table id="dataTable">
    <thead></thead>
    <tbody></tbody>
  </table>

  <script>
    const supabaseUrl = "https://xvrxzdfaildozjtxfgai.supabase.co"
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2cnh6ZGZhaWxkb3pqdHhmZ2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMTc5NDcsImV4cCI6MjA4MjU5Mzk0N30.jizniNYCJYFGimJSz_WmTlQBAN-DMNFqcgddjS1YIlU"
    const client = supabase.createClient(supabaseUrl, supabaseKey)

    const pageSize = 100
    let currentPage = 0

    async function loadTable() {
      const from = currentPage * pageSize
      const to = from + pageSize - 1

      const { data, error } = await client
        .from("floorsheet")
        .select("*")
        .range(from, to)

      if (error) {
        console.error(error)
        return
      }

      const tableHead = document.querySelector("#dataTable thead")
      const tableBody = document.querySelector("#dataTable tbody")

      if (!data || data.length === 0) {
        tableBody.innerHTML = "<tr><td>No data</td></tr>"
        return
      }

      // headers
      const headers = Object.keys(data[0])
      tableHead.innerHTML =
        "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>"

      // rows
      tableBody.innerHTML = data.map(row =>
        "<tr>" +
        headers.map(h => `<td>${row[h]}</td>`).join("") +
        "</tr>"
      ).join("")

      document.getElementById("pageInfo").innerText =
        `Page: ${currentPage + 1}`
    }

    function nextPage() {
      currentPage++
      loadTable()
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--
        loadTable()
      }
    }

    loadTable()
  </script>
</body>
</html>
